version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DB:-har_router}
      POSTGRES_USER:     ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_HOST:     db
      PG_PORT:     5432
      PG_DB:       ${PG_DB:-har_router}
      PG_USER:     ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
    volumes:
      - models_data:/app/models
      - data_uploads:/app/data
      - metrics_data:/app/metrics
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""   # empty = use /api proxy via nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  models_data:
  data_uploads:
  metrics_data:
